{% load static %}

<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="icon" href="{% static 'buyntrade/favicon.svg' %}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{% static 'buyntrade/favicon.svg' %}">
    <meta name="theme-color" content="#ff8c00">
    <link rel="stylesheet" href="{% static 'buyntrade/styles.css' %}">
    <script src="{% static 'buyntrade/theme.js' %}" defer></script>
    <script src="{% static 'buyntrade/nav.js' %}" defer></script>
    <script src="{% static 'buyntrade/shop.js' %}" defer></script>
    {% block extra_scripts %}{% endblock %}
  </head>
  <body>
    <div class="page-shell">
      <nav class="navbar">
        <div class="navbar-inner">
          <a class="navbar-brand" href="{% url 'index' %}">
            <img class="brand-icon" src="{% static 'buyntrade/favicon.svg' %}" alt="" width="32" height="32">
            <span class="brand-text">BuyNTrade</span>
          </a>

          <div class="navbar-links" id="navbar-links">
            <a class="nav-link{% if request.resolver_match.url_name == 'index' %} active{% endif %}" href="{% url 'index' %}">Shop</a>
            {% if user.is_authenticated %}
              <a class="nav-link{% if request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'my_listings' or request.resolver_match.url_name == 'orders' or request.resolver_match.url_name == 'messages' or request.resolver_match.url_name == 'settings' %} active{% endif %}" href="{% url 'dashboard' %}">Account</a>
              <a class="nav-link{% if request.resolver_match.url_name == 'create' %} active{% endif %}" href="{% url 'create' %}">Sell</a>
              <a class="nav-link{% if request.resolver_match.url_name == 'watchlist' %} active{% endif %}" href="{% url 'watchlist' %}">Favorites</a>
              <a class="nav-link" href="{% url 'logout' %}">Log Out</a>
            {% else %}
              <a class="nav-link{% if request.resolver_match.url_name == 'login' %} active{% endif %}" href="{% url 'login' %}">Log In</a>
              <a class="nav-link{% if request.resolver_match.url_name == 'register' %} active{% endif %}" href="{% url 'register' %}">Register</a>
            {% endif %}
          </div>

          <div class="navbar-actions">
            <button type="button" class="icon-button" data-theme-toggle aria-label="Switch theme">
              <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
              </svg>
              <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>

            <button type="button" class="icon-button mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navbar-links">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 7h16M4 12h16M4 17h16"></path>
              </svg>
            </button>
          </div>
        </div>
      </nav>

      <main class="page-content">
        {% block body %}{% endblock %}
      </main>

      {% include "buyntrade/_footer.html" %}
    </div>
  </body>
</html>
