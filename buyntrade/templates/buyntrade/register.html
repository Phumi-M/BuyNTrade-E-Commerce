{% extends "buyntrade/layout.html" %}

{% block title %}Register — {{ site_name }}{% endblock %}

{% block body %}
<div class="panel auth-panel">
  <h1 class="page-heading">Register</h1>
  <p class="page-lead">Create your BuyNTrade account.</p>

  {% if message %}
    <div class="alert alert-error">{{ message }}</div>
  {% endif %}

  <form action="{% url 'register' %}" method="post" class="form-stack">
    {% csrf_token %}
    <div class="form-group">
      <input class="form-control" autofocus type="text" name="username" placeholder="Username">
    </div>
    <div class="form-group">
      <input class="form-control" type="email" name="email" placeholder="Email Address">
    </div>
    <div class="form-group">
      <input class="form-control" type="password" name="password" placeholder="Password">
    </div>
    <div class="form-group">
      <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
    </div>
    <button class="btn btn-primary" type="submit">Register</button>
  </form>

  <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Log In here.</a></p>
</div>
{% endblock %}
