{% extends "buyntrade/layout.html" %}

{% block title %}Log In — {{ site_name }}{% endblock %}

{% block body %}
<div class="panel auth-panel">
  <h1 class="page-heading">Login</h1>
  <p class="page-lead">Welcome back to BuyNTrade.</p>

  {% if message %}
    <div class="alert alert-error">{{ message }}</div>
  {% endif %}

  <form action="{% url 'login' %}" method="post" class="form-stack">
    {% csrf_token %}
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <div class="form-group">
      <input autofocus class="form-control" type="text" name="username" placeholder="Username">
    </div>
    <div class="form-group">
      <input class="form-control" type="password" name="password" placeholder="Password">
    </div>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>

  <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register here.</a></p>
</div>
{% endblock %}
