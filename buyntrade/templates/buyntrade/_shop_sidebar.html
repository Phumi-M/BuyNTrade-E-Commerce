<aside class="shop-sidebar" id="shop-sidebar">
  <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-expanded="false" aria-controls="shop-sidebar-panel">
    Filters
    <svg class="sidebar-toggle-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M6 9l6 6 6-6"></path>
    </svg>
  </button>
  <div class="shop-sidebar-panel" id="shop-sidebar-panel">
  {% include "buyntrade/_sidebar_account_nav.html" %}

  {% if categories %}
  <div class="filter-block">
    <h3 class="filter-heading">Category</h3>
    <ul class="filter-links">
      <li>
        <a href="{% url 'index' %}" class="{% if not active_category_id %}active{% endif %}">All</a>
      </li>
      {% for category in categories %}
        <li>
          <a href="{% url 'category_listings' category.id %}" class="{% if active_category_id == category.id %}active{% endif %}">
            {{ category.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  {% if max_price %}
  <div class="filter-block">
    <h3 class="filter-heading">Price</h3>
    <div class="price-range-labels">
      <span>R0</span>
      <span id="price-max-label">R{{ max_price }}</span>
    </div>
    <input
      type="range"
      id="price-range"
      class="price-slider"
      min="0"
      max="{{ max_price }}"
      value="{{ max_price }}"
    >
  </div>
  {% endif %}
  </div>
</aside>
