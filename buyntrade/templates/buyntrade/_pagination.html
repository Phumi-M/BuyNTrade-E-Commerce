{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Listings pages">
  {% if page_obj.has_previous %}
    <a class="pagination-link" href="?page={{ page_obj.previous_page_number }}{% if pagination_query %}&amp;{{ pagination_query }}{% endif %}">Previous</a>
  {% else %}
    <span class="pagination-link pagination-link-disabled">Previous</span>
  {% endif %}

  <span class="pagination-status">
    Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
    <a class="pagination-link" href="?page={{ page_obj.next_page_number }}{% if pagination_query %}&amp;{{ pagination_query }}{% endif %}">Next</a>
  {% else %}
    <span class="pagination-link pagination-link-disabled">Next</span>
  {% endif %}
</nav>
{% endif %}
